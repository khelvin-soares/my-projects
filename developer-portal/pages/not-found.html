<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../images/icon-code.ico" type="image/x-icon">
    <title>Developer Portal - Not Found</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        :root {
            --Cor1: #32D8FF;
            --Cor2: #5BC6FF;
            --Cor3: #96ADFF;
            --Cor4: #C698FF;
            --Cor5: #FE80FF;

            --font-padrao: Arial, Helvetica, sans-serif;
            --font-mod: 'Ethnocentric', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-padrao);
            background-image: linear-gradient(45deg, var(--Cor3), var(--Cor4));
        }

        main {
            min-height: 100vh;
            padding: 25px 15px;
            display: flex;
            flex-direction: row;
            align-items: center;
        }

        #not-found {
            width: 100%;
            display: block;
        }

        #not-found > article {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #not-found > article > figure > img {
            max-width: 400px;
            margin: auto;
            transition-duration: 0.5s;
        }

        #not-found > article > h1 {
            padding: 25px;
            color: white;
            font-size: 2em;
            transition-duration: 0.5s;
        }

        #not-found > article > p {
            padding: 5px;
            color: white;
            max-width: 600px;
            text-align: center;
        }

        #not-found > article > a {
            padding: 10px;
            font-weight: bolder;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.624);
        }

        @media (max-width: 599px) {
            #not-found > article > figure > img {
                max-width: 300px;
                transition-duration: 0.5s;
            }
            
            #not-found > article > h1 {
                padding: 25px;
                font-size: 1.5em;
                transition-duration: 0.5s;
            }
        }
    </style>
</head>
<body>
    <main>
        <section id="not-found">
            <article>
                <figure>
                    <img src="../images/404-error.svg" alt="Not Found">
                </figure>
                <h1>Serviço indisponível!</h1>
                <p>Os servidores do Developer Portal foram desativados e alguns serviços podem não estar funcionando!</p>
                <a href="https://developersweb-portal.vercel.app/">&lsaquo; Voltar</a>
            </article>
        </section>
    </main>
</body>
</html>
